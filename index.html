<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ip Lookup — DevKit Tools</title><meta name="description" content="在线 IP 查询工具 - 查询 IP 地址的归属地、ISP、经纬度信息"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}header .badge{font-size:10px;background:#daa520;color:#fff;padding:2px 8px;border-radius:10px;margin-left:8px}main{max-width:700px;margin:0 auto;padding:32px 24px;flex:1}.tool-wrapper{padding:20px 0}footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}footer a{color:#58a6ff;text-decoration:none;margin:0 8px}.btn-primary:hover{background:#2ea043!important}.btn:hover{background:#30363d!important}input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff!important}.btn{font-family:inherit}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div><div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div></header><main><h1 style="font-size:24px;margin-bottom:4px">IP Lookup</h1><p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线 IP 查询工具 - 查询 IP 地址的归属地、ISP、经纬度信息</p><div class="tool-wrapper"><div style="display:flex;gap:8px;margin-bottom:16px;align-items:center"><input type="text" id="ip-input" placeholder="Input IP 地址，留空查自己..." style="flex:1;padding:14px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;outline:none;font-family:mono"><button class="btn btn-primary" style="padding:12px 24px;background:#238636;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600" onclick="lookupIP()">🔍 查询</button></div><div id="ip-result" style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;min-height:150px"><span style="color:#8b949e">Input IP 查询，或留空查询你的 IP</span></div></div></main><footer><a href="https://github.com/479464887-rgb/ip-lookup">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>async function lookupIP(){const ip=document.getElementById('ip-input').value.trim();const r=document.getElementById('ip-result');r.innerHTML='<span style=color:#8b949e>查询中...</span>';try{const url=ip?`https://ipapi.co/${ip}/json/`:'https://ipapi.co/json/';const resp=await fetch(url);const d=await resp.json();if(d.error){r.innerHTML=`<span style=color:#f85149>查询失败: ${d.reason||d.error}</span>`;return}r.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">IP</span><br><span style="font-family:mono;font-size:14px;color:#58a6ff">${d.ip}</span></div><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">国家/地区</span><br><span style="font-size:14px">${d.country_name||'-'} ${d.country_code||''}</span></div><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">城市</span><br><span style="font-size:14px">${d.city||'-'}</span></div><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">地区</span><br><span style="font-size:14px">${d.region||'-'}</span></div><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">ISP</span><br><span style="font-size:14px">${d.org||'-'}</span></div><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">坐标</span><br><span style="font-size:14px">${d.latitude||'?'}, ${d.longitude||'?'}</span></div><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">时区</span><br><span style="font-size:14px">${d.timezone||'-'}</span></div><div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style="color:#8b949e;font-size:11px">邮编</span><br><span style="font-size:14px">${d.postal||'-'}</span></div></div>`}catch(e){r.innerHTML='<span style=color:#f85149>查询失败: '+e.message+'</span>'}}
lookupIP()</script></body></html>
